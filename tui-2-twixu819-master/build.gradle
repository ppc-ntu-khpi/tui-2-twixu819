plugins {
	id 'java'
	id 'application'
}

application {
	mainClass = 'com.mybank.tui.CLIdemo'
}

sourceSets {
	main {
		java {
			srcDirs = ['Lab 2 - CLI']
		}
	}
}

repositories {
	mavenCentral()
	flatDir {
		dirs 'jars'
	}
}

dependencies {
	testImplementation('org.junit.jupiter:junit-jupiter:5.6.0')

	implementation name: 'jansi-1.17.1'
	implementation name: 'jexer-0.3.0'
	implementation name: 'jline-3.10.0'
	implementation name: 'MyBank'
}

test {
	useJUnitPlatform()
	testLogging {
		events "passed", "skipped", "failed"
	}
}